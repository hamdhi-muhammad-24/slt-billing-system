name: Build and Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-1
  ECR_BACKEND_REPO: slt-backend
  ECS_CLUSTER: slt-cluster
  ECS_SERVICE_BACKEND: slt-backend-service
  ECS_SERVICE_WORKER: slt-worker-service
  ECS_SERVICE_BEAT: slt-beat-service
  FRONTEND_BUCKET: ${{ secrets.FRONTEND_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
  VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

jobs:
  deploy:
    name: Build images and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: build-backend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG"
          docker build -t "$IMAGE" .
          docker tag "$IMAGE" "$REGISTRY/$ECR_BACKEND_REPO:latest"
          docker push "$IMAGE"
          docker push "$REGISTRY/$ECR_BACKEND_REPO:latest"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Check ECS services
        id: ecs-services
        run: |
          services=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_BACKEND" "$ECS_SERVICE_WORKER" "$ECS_SERVICE_BEAT" --query "services[?status=='ACTIVE'].serviceName" --output text)
          for service in "$ECS_SERVICE_BACKEND" "$ECS_SERVICE_WORKER" "$ECS_SERVICE_BEAT"; do
            if echo "$services" | grep -qw "$service"; then
              key=$(echo "$service" | sed 's/slt-//' | sed 's/-service//' | tr '-' '_')
              echo "${key}_exists=true" >> "$GITHUB_OUTPUT"
            else
              key=$(echo "$service" | sed 's/slt-//' | sed 's/-service//' | tr '-' '_')
              echo "${key}_exists=false" >> "$GITHUB_OUTPUT"
              echo "::notice::$service does not exist yet. Run aws/phase-6e-deploy-infra.ps1 after this image is pushed."
            fi
          done

      - name: Register and deploy backend task
        if: steps.ecs-services.outputs.backend_exists == 'true'
        env:
          IMAGE: ${{ steps.build-backend.outputs.image }}
        run: |
          jq --arg IMAGE "$IMAGE" '.containerDefinitions[0].image = $IMAGE' aws/task-def-backend.json > /tmp/task-def-backend.json
          TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file:///tmp/task-def-backend.json --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE_BACKEND" --task-definition "$TASK_DEF_ARN" --force-new-deployment --output text --query "service.serviceName"

      - name: Register and deploy worker task
        if: steps.ecs-services.outputs.worker_exists == 'true'
        env:
          IMAGE: ${{ steps.build-backend.outputs.image }}
        run: |
          jq --arg IMAGE "$IMAGE" '.containerDefinitions[0].image = $IMAGE' aws/task-def-worker.json > /tmp/task-def-worker.json
          TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file:///tmp/task-def-worker.json --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE_WORKER" --task-definition "$TASK_DEF_ARN" --force-new-deployment --output text --query "service.serviceName"

      - name: Register and deploy beat task
        if: steps.ecs-services.outputs.beat_exists == 'true'
        env:
          IMAGE: ${{ steps.build-backend.outputs.image }}
        run: |
          jq --arg IMAGE "$IMAGE" '.containerDefinitions[0].image = $IMAGE' aws/task-def-beat.json > /tmp/task-def-beat.json
          TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file:///tmp/task-def-beat.json --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE_BEAT" --task-definition "$TASK_DEF_ARN" --force-new-deployment --output text --query "service.serviceName"

      - name: Wait for ECS services
        if: steps.ecs-services.outputs.backend_exists == 'true'
        run: |
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_BACKEND"
          if [ "${{ steps.ecs-services.outputs.worker_exists }}" = "true" ]; then aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_WORKER"; fi
          if [ "${{ steps.ecs-services.outputs.beat_exists }}" = "true" ]; then aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_BEAT"; fi

      - name: Check frontend deploy secrets
        id: frontend-secrets
        run: |
          if [ -n "$FRONTEND_BUCKET" ] && [ -n "$CLOUDFRONT_DISTRIBUTION_ID" ] && [ -n "$VITE_API_BASE_URL" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping frontend deploy until FRONTEND_BUCKET, CLOUDFRONT_DISTRIBUTION_ID, and VITE_API_BASE_URL repository secrets are set."
          fi

      - name: Set up Node
        if: steps.frontend-secrets.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        if: steps.frontend-secrets.outputs.ready == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy frontend to S3 and CloudFront
        if: steps.frontend-secrets.outputs.ready == 'true'
        run: |
          aws s3 sync frontend/dist "s3://$FRONTEND_BUCKET" --delete --exclude "index.html" --cache-control "public,max-age=31536000,immutable"
          aws s3 cp frontend/dist/index.html "s3://$FRONTEND_BUCKET/index.html" --cache-control "no-cache,no-store,must-revalidate" --content-type "text/html"
          aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"
